name: Docs request
description: Request a change or clarification in public documentation.
title: "[Docs] "
labels:
  - type:docs
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should be changed in the docs?
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Current location
      description: Link or file path if known.
  - type: textarea
    id: issue
    attributes:
      label: Problem with the current docs
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested wording or structure
