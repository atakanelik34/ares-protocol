name: Feature request
description: Propose a public-facing improvement for ARES Protocol.
title: "[Feature] "
labels:
  - type:feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - contracts
        - api
        - explorer
        - sdk
        - subgraph
        - docs
        - ci/tooling
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or interface.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: rollout
    attributes:
      label: Rollout concerns
      description: Note compatibility, migrations, or risk if relevant.
