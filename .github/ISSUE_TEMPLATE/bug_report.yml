name: Bug report
description: Report a product or code defect in the public repository surface.
title: "[Bug] "
labels:
  - type:bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect and why it matters.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - contracts
        - api
        - explorer
        - sdk
        - subgraph
        - docs
        - ci/tooling
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Exact steps, requests, or commands to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or traces
      description: Add anything that helps validate the issue.
