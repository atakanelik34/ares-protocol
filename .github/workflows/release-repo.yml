name: Release / Repo

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (for example v0.1.0)'
        required: true
      title:
        description: 'Release title'
        required: false
        default: 'ARES Protocol release'

concurrency:
  group: release-repo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "title=ARES Protocol ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "title=${{ inputs.title }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          allowUpdates: true
          body: |
            See `CHANGELOG.md` for detailed release notes.

            Compatibility notes:
            - Public API routes remain unchanged.
            - Public explorer remains available at `app.ares-protocol.xyz`.
            - Public docs hub remains available at `ares-protocol.xyz/docs`.
