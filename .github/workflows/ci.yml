name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: contracts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Bootstrap dependencies
        run: bash ./scripts/contracts/bootstrap.sh
      - name: Run forge tests
        run: forge test --root ./contracts

  apps:
    name: apps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install workspace deps
        run: npm ci
      - name: Enforce critical dependency gate (prod workspaces)
        run: node scripts/security/check-critical-audit.mjs dashboard/agent-explorer dashboard/protocol-admin api/query-gateway
      - name: Run tests
        run: npm run test
      - name: Tokenomics validation
        run: npm run tokenomics:validate
      - name: Build explorer
        run: npm --workspace dashboard/agent-explorer run build
      - name: Build TypeScript SDK
        run: npm --workspace sdk/typescript run build
      - name: Build subgraph
        run: |
          npm --workspace subgraph run codegen
          npm --workspace subgraph run build
